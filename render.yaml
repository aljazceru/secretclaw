services:
  - type: web
    name: secretclaw
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: SETUP_PASSWORD
        sync: false
      - key: SECRETCLAW_STATE_DIR
        value: /data/.secretclaw
      - key: SECRETCLAW_WORKSPACE_DIR
        value: /data/workspace
      - key: SECRETCLAW_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: secretclaw-data
      mountPath: /data
      sizeGB: 1
